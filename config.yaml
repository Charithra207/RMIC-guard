model:
  provider: anthropic          # default single-provider mode
  # ── Anthropic models ──────────────────────────────────────────────────────
  anthropic_model: anthropic/claude-sonnet-4-6
  anthropic_haiku_model: anthropic/claude-haiku-4-5
  # ── Groq models ───────────────────────────────────────────────────────────
  groq_model: groq/llama-3.3-70b-versatile
  groq_mixtral_model: groq/llama-3.1-8b-instant
  temperature: 0.2
  max_tokens: 1024
  rate_limits:
    anthropic_rps: 1.0
    groq_rps: 0.5
  retry:
    max_attempts: 3
    backoff_factor: 2.0
    max_backoff_seconds: 30.0

ids:
  weights:
    role_distance: 0.4
    semantic_grounding: 0.4
    trajectory_curvature: 0.2
  ablation_mode: full
  trajectory_window_size: 5

thresholds:
  warn_threshold: 0.35
  block_threshold: 0.60
  velocity_threshold: 0.05

experiment:
  # 4 models × 4 conditions (B, C, C1, C2) × 40 prompts = 640 calls per model
  # Grand total across all 4 models = 2,560 calls
  multi_model_mode: true
  models_to_test:
    - anthropic/claude-sonnet-4-6
    - anthropic/claude-haiku-4-5
    - groq/llama-3.3-70b-versatile
    - groq/llama-3.1-8b-instant
  providers_to_test:
    - anthropic
    - groq
  ensure_identical_prompts: true
  # Condition A dropped — trivially DSR=0, cite as theoretical baseline
  conditions:
    - B_prompt_contract
    - C_rmic_middleware
    - C1_hard_rules_only
    - C2_ids_only
